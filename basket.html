<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корзина - MusicShop</title>
    <link rel="icon" href="images/guitar_icon.png" type="image/png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <style>
        .cart-container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        .cart-items { background: white; border-radius: 10px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); overflow: hidden; margin-bottom: 2rem; }
        .cart-item { display: flex; align-items: center; padding: 1.5rem; border-bottom: 1px solid #eee; gap: 1.5rem; }
        .cart-item-image { width: 120px; height: 120px; object-fit: cover; border-radius: 8px; }
        .cart-item-info { flex: 1; }
        .cart-item-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 0.5rem; }
        .cart-item-price { color: #666; font-size: 1.1rem; }
        .cart-item-quantity { display: flex; align-items: center; gap: 0.5rem; margin-top: 1rem; }
        .quantity-btn { width: 30px; height: 30px; border: 1px solid #ddd; background: white; border-radius: 4px; cursor: pointer; }
        .quantity-input { width: 50px; text-align: center; border: 1px solid #ddd; border-radius: 4px; padding: 0.3rem; }
        .cart-item-remove { background: #ff4444; color: white; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; }
        .cart-summary { background: white; border-radius: 10px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); padding: 2rem; margin-bottom: 2rem; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid #eee; }
        .summary-total { font-size: 1.5rem; font-weight: 600; color: #333; }
        .cart-actions { display: flex; gap: 1rem; justify-content: space-between; margin-top: 2rem; }
        .empty-cart { text-align: center; padding: 3rem; background: white; border-radius: 10px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .empty-cart-icon { font-size: 4rem; color: #ddd; margin-bottom: 1rem; }
        .notification { position: fixed; top: 20px; right: 20px; padding: 1rem 1.5rem; border-radius: 5px; z-index: 1000; animation: slideIn 0.3s ease-out; }
        .notification.success { background: #4CAF50; color: white; }
        .notification.error { background: #ff4444; color: white; }
        .notification.info { background: #2196F3; color: white; }
        .loading { text-align: center; padding: 3rem; font-size: 1.2rem; color: #666; }
        .checkout-form { background: white; border-radius: 10px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); padding: 2rem; margin-top: 2rem; display: none; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        .form-group input, .form-group textarea { width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .auth-message { text-align: center; padding: 50px; background: #f8f9fa; border-radius: 10px; margin: 50px 0; }
        .auth-message i { font-size: 64px; color: #dc3545; margin-bottom: 20px; }
        .auth-message h2 { color: #333; margin-bottom: 20px; }
        .auth-message p { margin: 20px 0; color: #666; }
        .btn { display: inline-block; padding: 12px 30px; background: #4361ee; color: white; text-decoration: none; border-radius: 5px; border: none; cursor: pointer; }
        .btn-secondary { background: #6c757d; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0; } }
        .cart-count { background: #ff4444; color: white; border-radius: 50%; padding: 0.2rem 0.5rem; font-size: 0.8rem; min-width: 20px; height: 20px; display: inline-flex; align-items: center; justify-content: center; margin-left: 5px; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <a href="index.html" class="logo">MusicShop</a>
                <ul class="nav-links">
                    <li><a href="index.html">Главная</a></li>
                    <li><a href="catalog.html">Каталог</a></li>
                    <li><a href="about.html">О нас</a></li>
                    <li><a href="basket.html">Корзина <span id="cartCount" class="cart-count" style="display: none;">0</span></a></li>
                    <li id="authNavLink"><a href="autorisation.html">Вход</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="container">
            <h1 class="section-title">Корзина</h1>
            
            <div id="cartContent" class="cart-container">
                <div id="loading" class="loading">
                    <i class="fas fa-spinner fa-spin"></i> Проверка авторизации...
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-info">
                    <h3>Интернет-магазин музыкальных инструментов</h3>
                    <p>© 2026 Все права защищены</p>
                </div>
                <ul class="footer-links">
                    <li><a href="index.html">Главная</a></li>
                    <li><a href="catalog.html">Каталог</a></li>
                    <li><a href="about.html">О нас</a></li>
                    <li><a href="basket.html">Корзина</a></li>
                    <li><a href="registration.html">Регистрация</a></li>
                </ul>
                <div class="social-icons">
                    <a href="#" class="social-icon"><i class="fab fa-vk"></i></a>
                    <a href="#" class="social-icon"><i class="fab fa-telegram"></i></a>
                    <a href="#" class="social-icon"><i class="fab fa-youtube"></i></a>
                </div>
            </div>
        </div>
    </footer>

    <script>
        // Глобальные переменные
        let cartItems = [];
        let currentUser = null;

        // Функция для получения изображения по категории
        function getImageByCategory(category) {
            const images = {
                'guitars': 'https://images.unsplash.com/photo-1516924962500-2b4b3b99ea02?ixlib=rb-1.2.1&auto=format&fit=crop&w=600&q=80',
                'keyboards': 'https://images.unsplash.com/photo-1519892300165-cb5542fb47c7?ixlib=rb-1.2.1&auto=format&fit=crop&w=600&q=80',
                'drums': 'https://images.unsplash.com/photo-1556228453-efd6c1ff04f6?ixlib=rb-1.2.1&auto=format&fit=crop&w=600&q=80',
                'wind': 'https://images.unsplash.com/photo-1571974096035-b4f8b0034e53?ixlib=rb-1.2.1&auto=format&fit=crop&w=600&q=80'
            };
            return images[category] || images.guitars;
        }

        // Инициализация
        document.addEventListener('DOMContentLoaded', async function() {
            await checkAuthAndLoadCart();
            updateNavigation();
        });

        // Проверка авторизации и загрузка корзины
        async function checkAuthAndLoadCart() {
            const loadingDiv = document.getElementById('loading');
            const cartContent = document.getElementById('cartContent');
            
            try {
                const { data: { session }, error: sessionError } = await supabase.auth.getSession();
                
                if (sessionError) {
                    console.error('Ошибка сессии:', sessionError);
                }
                
                if (!session) {
                    loadingDiv.style.display = 'none';
                    cartContent.innerHTML = `
                        <div class="auth-message">
                            <i class="fas fa-lock"></i>
                            <h2>Корзина доступна только авторизованным пользователям</h2>
                            <p>Пожалуйста, войдите в аккаунт, чтобы просмотреть свою корзину</p>
                            <a href="autorisation.html" class="btn">Войти в аккаунт</a>
                            <p style="margin-top: 20px;">
                                Ещё нет аккаунта? <a href="registration.html" style="color: #4361ee;">Зарегистрироваться</a>
                            </p>
                        </div>
                    `;
                    return;
                }
                
                currentUser = session.user;
                console.log('👤 Пользователь авторизован:', currentUser.email);
                
                await loadCartFromSupabase();
                
            } catch (error) {
                console.error('Ошибка при проверке авторизации:', error);
                loadingDiv.style.display = 'none';
                cartContent.innerHTML = `
                    <div class="auth-message">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h2>Ошибка подключения</h2>
                        <p>Не удалось проверить авторизацию. Попробуйте позже.</p>
                        <a href="index.html" class="btn">На главную</a>
                    </div>
                `;
            }
        }

        // Загрузка корзины из Supabase
        async function loadCartFromSupabase() {
            const cartContent = document.getElementById('cartContent');
            const loadingDiv = document.getElementById('loading');
            
            try {
                const { data, error } = await supabase
                    .from('cart')
                    .select(`
                        id,
                        quantity,
                        product_id,
                        products (
                            id,
                            name,
                            description,
                            price,
                            category,
                            image_url
                        )
                    `)
                    .eq('user_id', currentUser.id);
                
                if (error) throw error;
                
                cartItems = data || [];
                console.log('📦 Загружено товаров в корзину:', cartItems.length);
                
                loadingDiv.style.display = 'none';
                
                if (cartItems.length === 0) {
                    cartContent.innerHTML = `
                        <div class="empty-cart">
                            <div class="empty-cart-icon">
                                <i class="fas fa-shopping-cart"></i>
                            </div>
                            <h2>Ваша корзина пуста</h2>
                            <p>Добавьте товары из каталога, чтобы сделать заказ</p>
                            <a href="catalog.html" class="btn" style="margin-top: 1rem;">
                                <i class="fas fa-arrow-left"></i> Перейти в каталог
                            </a>
                        </div>
                    `;
                    updateCartCount();
                    return;
                }
                
                renderCart();
                updateCartCount();
                
            } catch (error) {
                console.error('❌ Ошибка загрузки корзины:', error);
                loadingDiv.style.display = 'none';
                cartContent.innerHTML = `
                    <div class="empty-cart">
                        <div class="empty-cart-icon">
                            <i class="fas fa-exclamation-triangle"></i>
                        </div>
                        <h2>Ошибка загрузки корзины</h2>
                        <p>${error.message}</p>
                        <button onclick="location.reload()" class="btn" style="margin-top: 1rem;">
                            <i class="fas fa-sync"></i> Попробовать снова
                        </button>
                    </div>
                `;
            }
        }

        // Обновление навигации
        function updateNavigation() {
            const authNavLink = document.getElementById('authNavLink');
            if (!authNavLink) return;
            
            supabase.auth.getSession().then(({ data: { session } }) => {
                if (session) {
                    authNavLink.innerHTML = `<a href="#" id="logoutBtn">Выйти (${session.user.email.split('@')[0]})</a>`;
                    const logoutBtn = document.getElementById('logoutBtn');
                    if (logoutBtn) {
                        logoutBtn.addEventListener('click', async (e) => {
                            e.preventDefault();
                            await supabase.auth.signOut();
                            localStorage.removeItem('user');
                            window.location.href = 'index.html';
                        });
                    }
                } else {
                    authNavLink.innerHTML = '<a href="autorisation.html">Вход</a>';
                }
            });
        }

        // Отображение корзины
        function renderCart() {
            const cartContent = document.getElementById('cartContent');
            
            const subtotal = cartItems.reduce((sum, item) => sum + (item.products.price * item.quantity), 0);
            const shipping = subtotal > 50000 ? 0 : 500;
            const total = subtotal + shipping;
            
            const formatPrice = (price) => new Intl.NumberFormat('ru-RU').format(price);
            
            let cartHTML = `
                <div class="cart-items" id="cartItemsList">
            `;
            
            cartItems.forEach((item, index) => {
                const product = item.products;
                const itemTotal = product.price * item.quantity;
                
                // Получаем правильное изображение: либо из БД, либо по категории
                let productImage = product.image_url;
                if (!productImage || productImage === '') {
                    productImage = getImageByCategory(product.category);
                }
                
                cartHTML += `
                    <div class="cart-item" data-cart-id="${item.id}" data-index="${index}">
                        <img src="${productImage}" 
                            alt="${escapeHtml(product.name)}" 
                            class="cart-item-image"
                            onerror="this.src='${getImageByCategory(product.category)}'">
                        <div class="cart-item-info">
                            <h3 class="cart-item-title">${escapeHtml(product.name)}</h3>
                            <p class="cart-item-price">${formatPrice(product.price)} ₽ × ${item.quantity} = ${formatPrice(itemTotal)} ₽</p>
                            <div class="cart-item-quantity">
                                <button class="quantity-btn decrease-btn" data-cart-id="${item.id}">
                                    <i class="fas fa-minus"></i>
                                </button>
                                <input type="number" 
                                    class="quantity-input" 
                                    value="${item.quantity}" 
                                    min="1" 
                                    max="99"
                                    data-cart-id="${item.id}">
                                <button class="quantity-btn increase-btn" data-cart-id="${item.id}">
                                    <i class="fas fa-plus"></i>
                                </button>
                            </div>
                        </div>
                        <button class="cart-item-remove remove-btn" data-cart-id="${item.id}">
                            <i class="fas fa-trash"></i> Удалить
                        </button>
                    </div>
                `;
            });
            
            cartHTML += `
                </div>
                
                <div class="cart-summary">
                    <h2 style="margin-bottom: 1.5rem;">Сводка заказа</h2>
                    <div class="summary-row">
                        <span>Подытог:</span>
                        <span>${formatPrice(subtotal)} ₽</span>
                    </div>
                    <div class="summary-row">
                        <span>Доставка:</span>
                        <span>${shipping === 0 ? 'Бесплатно' : formatPrice(shipping) + ' ₽'}</span>
                    </div>
                    <div class="summary-row summary-total">
                        <span>Итого:</span>
                        <span>${formatPrice(total)} ₽</span>
                    </div>
                    
                    <div class="cart-actions">
                        <a href="catalog.html" class="btn btn-secondary">
                            <i class="fas fa-arrow-left"></i> Продолжить покупки
                        </a>
                        <button id="checkoutBtn" class="btn">
                            <i class="fas fa-credit-card"></i> Оформить заказ
                        </button>
                    </div>
                </div>
                
                <div id="checkoutForm" class="checkout-form">
                    <h2>Оформление заказа</h2>
                    <form id="orderForm">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="name">Имя *</label>
                                <input type="text" id="name" name="name" required>
                            </div>
                            <div class="form-group">
                                <label for="phone">Телефон *</label>
                                <input type="tel" id="phone" name="phone" required placeholder="+7 (999) 123-45-67">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="email">Email *</label>
                                <input type="email" id="email" name="email" required value="${currentUser.email}">
                            </div>
                            <div class="form-group">
                                <label for="city">Город *</label>
                                <input type="text" id="city" name="city" required placeholder="Москва">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="address">Адрес доставки *</label>
                            <input type="text" id="address" name="address" required placeholder="ул. Примерная, д. 1, кв. 1">
                        </div>
                        <div class="form-group">
                            <label for="comment">Комментарий к заказу</label>
                            <textarea id="comment" name="comment" rows="3" placeholder="Дополнительные пожелания"></textarea>
                        </div>
                        <div class="cart-actions">
                            <button type="button" id="cancelCheckout" class="btn btn-secondary">
                                <i class="fas fa-times"></i> Отмена
                            </button>
                            <button type="submit" class="btn">
                                <i class="fas fa-check"></i> Подтвердить заказ
                            </button>
                        </div>
                    </form>
                </div>
            `;
            
            cartContent.innerHTML = cartHTML;
            attachEventHandlers();
        }

        // Навешивание обработчиков событий
        function attachEventHandlers() {
            document.querySelectorAll('.increase-btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const cartId = btn.dataset.cartId;
                    const item = cartItems.find(i => i.id === cartId);
                    if (item) {
                        await updateQuantity(cartId, item.quantity + 1);
                    }
                });
            });
            
            document.querySelectorAll('.decrease-btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const cartId = btn.dataset.cartId;
                    const item = cartItems.find(i => i.id === cartId);
                    if (item && item.quantity > 1) {
                        await updateQuantity(cartId, item.quantity - 1);
                    }
                });
            });
            
            document.querySelectorAll('.quantity-input').forEach(input => {
                input.addEventListener('change', async () => {
                    const cartId = input.dataset.cartId;
                    const newQuantity = parseInt(input.value);
                    if (newQuantity >= 1 && newQuantity <= 99) {
                        await updateQuantity(cartId, newQuantity);
                    } else {
                        const item = cartItems.find(i => i.id === cartId);
                        if (item) {
                            input.value = item.quantity;
                        }
                    }
                });
            });
            
            document.querySelectorAll('.remove-btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const cartId = btn.dataset.cartId;
                    await removeFromCart(cartId);
                });
            });
            
            const checkoutBtn = document.getElementById('checkoutBtn');
            if (checkoutBtn) {
                checkoutBtn.addEventListener('click', showCheckoutForm);
            }
            
            const cancelCheckout = document.getElementById('cancelCheckout');
            if (cancelCheckout) {
                cancelCheckout.addEventListener('click', hideCheckoutForm);
            }
            
            const orderForm = document.getElementById('orderForm');
            if (orderForm) {
                orderForm.addEventListener('submit', handleOrderSubmit);
            }
        }

        // Обновление количества товара
        async function updateQuantity(cartId, newQuantity) {
            try {
                const { error } = await supabase
                    .from('cart')
                    .update({ quantity: newQuantity })
                    .eq('id', cartId);
                
                if (error) throw error;
                
                const item = cartItems.find(i => i.id === cartId);
                if (item) {
                    item.quantity = newQuantity;
                }
                
                renderCart();
                updateCartCount();
                showNotification('Количество обновлено', 'success');
                
            } catch (error) {
                console.error('Ошибка обновления:', error);
                showNotification('Ошибка при обновлении', 'error');
            }
        }

        // Удаление товара
        async function removeFromCart(cartId) {
            try {
                const { error } = await supabase
                    .from('cart')
                    .delete()
                    .eq('id', cartId);
                
                if (error) throw error;
                
                cartItems = cartItems.filter(i => i.id !== cartId);
                renderCart();
                updateCartCount();
                showNotification('Товар удален из корзины', 'info');
                
            } catch (error) {
                console.error('Ошибка удаления:', error);
                showNotification('Ошибка при удалении', 'error');
            }
        }

        // Обновление счетчика корзины
        async function updateCartCount() {
            const totalItems = cartItems.reduce((sum, item) => sum + item.quantity, 0);
            const cartCountElement = document.getElementById('cartCount');
            
            if (cartCountElement) {
                if (totalItems > 0) {
                    cartCountElement.textContent = totalItems;
                    cartCountElement.style.display = 'inline-flex';
                } else {
                    cartCountElement.style.display = 'none';
                }
            }
        }

        function showCheckoutForm() {
            const form = document.getElementById('checkoutForm');
            if (form) {
                form.style.display = 'block';
                form.scrollIntoView({ behavior: 'smooth' });
            }
        }

        function hideCheckoutForm() {
            const form = document.getElementById('checkoutForm');
            if (form) {
                form.style.display = 'none';
            }
        }

        async function handleOrderSubmit(e) {
            e.preventDefault();
            
            if (cartItems.length === 0) {
                showNotification('Корзина пуста!', 'error');
                return;
            }
            
            const form = e.target;
            const formData = new FormData(form);
            const orderData = {
                name: formData.get('name'),
                phone: formData.get('phone'),
                email: formData.get('email'),
                city: formData.get('city'),
                address: formData.get('address'),
                comment: formData.get('comment') || ''
            };
            
            if (!orderData.name || !orderData.phone || !orderData.email || !orderData.city || !orderData.address) {
                showNotification('Заполните все обязательные поля!', 'error');
                return;
            }
            
            const subtotal = cartItems.reduce((sum, item) => sum + (item.products.price * item.quantity), 0);
            const shipping = subtotal > 50000 ? 0 : 500;
            const total = subtotal + shipping;
            
            const orderItems = cartItems.map(item => ({
                id: item.products.id,
                name: item.products.name,
                price: item.products.price,
                quantity: item.quantity,
                category: item.products.category
            }));
            
            const orderForSupabase = {
                user_id: currentUser.id,
                customer_name: orderData.name,
                customer_phone: orderData.phone,
                customer_email: orderData.email,
                customer_city: orderData.city,
                customer_address: orderData.address,
                customer_comment: orderData.comment,
                items: orderItems,
                subtotal: subtotal,
                shipping: shipping,
                total: total,
                status: 'pending',
                created_at: new Date().toISOString()
            };
            
            const submitBtn = form.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            
            try {
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Оформление...';
                submitBtn.disabled = true;
                
                const { data, error } = await supabase
                    .from('orders')
                    .insert([orderForSupabase])
                    .select()
                    .single();
                
                if (error) throw error;
                
                await supabase.from('cart').delete().eq('user_id', currentUser.id);
                cartItems = [];
                hideCheckoutForm();
                showNotification(`Заказ №${data.id.substring(0, 8)} успешно оформлен!`, 'success');
                renderCart();
                updateCartCount();
                form.reset();
                
            } catch (error) {
                console.error('❌ Ошибка оформления заказа:', error);
                showNotification(`Ошибка: ${error.message}`, 'error');
            } finally {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        }

        function showNotification(message, type = 'success') {
            document.querySelectorAll('.notification').forEach(note => note.remove());
            
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i> ${message}`;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease-out';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
    </script>
</body>
</html>
